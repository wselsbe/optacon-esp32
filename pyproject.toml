[tool.ruff]
target-version = "py310"
exclude = ["python/microdot"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = [
    "E501",   # line too long — handled by formatter
    "F403",   # star imports — used in MicroPython manifests
    "F405",   # undefined from star import
    "UP035",  # deprecated typing imports — micropython compat
]

[tool.ruff.lint.per-file-ignores]
"python/manifest.py" = ["F821"]  # undefined name 'include', 'freeze' — MicroPython manifest builtins
"python/**/*.py" = ["SIM105", "E402"]  # no contextlib in MicroPython; boot ordering requires late imports
"mcp_micropython.py" = ["SIM105"]  # try/except/pass is clearer for serial cleanup

[tool.pytest.ini_options]
testpaths = ["test/integration", "test/e2e", "test/hardware"]
addopts = "--html=test/report.html"
asyncio_mode = "auto"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(name)s | %(message)s"
log_format = "%(name)s | %(message)s"
log_level = "INFO"
markers = [
    "hardware: tests requiring physical lab instruments (not run in CI)",
]
