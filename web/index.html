<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Optacon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#edebe7;--card:#fff;--border:#ccc9c2;--text:#1a1a20;--text2:#68686e;--text3:#98989e;
  --input:#f5f4f0;--drv:#b85a14;--esp:#2856a0;--hv:#167868;--green:#1a8848;--red:#c82e20;--radius:6px;
}
html{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text)}
body{max-width:520px;margin:0 auto;padding:10px 12px 28px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;
  box-shadow:0 1px 3px #0001}
.brand{font-family:"Consolas","SF Mono","Menlo",monospace;font-weight:700;font-size:15px;letter-spacing:3px;color:var(--text2)}
.status{display:flex;align-items:center;gap:10px;font-size:12px}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);
  margin-right:3px;vertical-align:middle;transition:background .3s}
.dot.on{background:var(--green);box-shadow:0 0 6px #1a884880}
.badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1px;
  font-family:"Consolas","SF Mono",monospace}
.badge.run{background:#1a884815;color:var(--green);border:1px solid #1a884830}
.badge.stop{background:#68686e12;color:var(--text3);border:1px solid #68686e30}
.wifi-link{font-size:11px;color:var(--esp);text-decoration:none;font-weight:600;
  padding:2px 6px;border:1px solid var(--esp);border-radius:4px}
.wifi-link:hover{background:var(--esp);color:#fff}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden;box-shadow:0 1px 3px #0001}
.card.drv{border-left:4px solid var(--drv)}
.card.esp{border-left:4px solid var(--esp)}
.card.hv{border-left:4px solid var(--hv)}
.card-h{padding:9px 16px;border-bottom:1px solid var(--border);background:#faf9f7;display:flex;align-items:baseline;gap:8px}
.card-h b{font-family:"Consolas","SF Mono","Menlo",monospace;font-size:13px;letter-spacing:.5px}
.card.drv .card-h b{color:var(--drv)}.card.esp .card-h b{color:var(--esp)}.card.hv .card-h b{color:var(--hv)}
.card-h span{font-size:12px;color:var(--text3);font-weight:400}
.card-b{padding:14px 16px}

/* Fields */
.field{margin-bottom:12px}.field:last-child{margin-bottom:0}
.field>label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:600;
  letter-spacing:.3px;text-transform:uppercase}
.field.row{display:flex;align-items:center;gap:8px}
.field.row>label{margin-bottom:0;text-transform:none}
.field-row{display:flex;gap:12px;margin-bottom:12px}
.field-row:last-child{margin-bottom:0}
.field-row .field{flex:1;margin-bottom:0}

/* Inputs */
input[type=number],select{width:100%;padding:7px 10px;background:var(--input);border:1.5px solid var(--border);
  border-radius:5px;color:var(--text);font-family:"Consolas","SF Mono",monospace;font-size:14px;outline:none;
  transition:border-color .15s}
input[type=number]:focus,select:focus{border-color:var(--esp)}
.input-row{display:flex;align-items:center;gap:6px}
.input-row input[type=number]{flex:1}
.unit{font-size:12px;color:var(--text3);white-space:nowrap;font-family:"Consolas","SF Mono",monospace}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--esp);cursor:pointer}

/* Sliders */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:3px;background:#d8d6d0;outline:none;cursor:pointer;border:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;
  border-radius:50%;background:var(--esp);border:3px solid #fff;box-shadow:0 1px 4px #0003;cursor:pointer}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;
  background:var(--esp);border:3px solid #fff;box-shadow:0 1px 4px #0003;cursor:pointer}

/* Frequency combo */
.freq-row{display:flex;align-items:center;gap:10px}
.freq-row input[type=range]{flex:1}
.freq-row input[type=number]{width:72px;text-align:right;flex:none}

/* Gain buttons */
.gain-row{display:flex;align-items:center;gap:6px;justify-content:center}
.gain-btn{padding:7px 0 6px;flex:1;max-width:100px;background:var(--card);border:1.5px solid var(--border);border-radius:5px;
  font-family:"Consolas","SF Mono",monospace;color:var(--text2);
  cursor:pointer;transition:all .12s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:1px}
.gain-btn:hover{border-color:var(--text3)}
.gain-btn.sel{background:var(--drv);border-color:var(--drv);color:#fff}
.gain-btn .db{font-size:13px;font-weight:700}
.gain-btn .vpp{font-size:10px;font-weight:400;opacity:.65}

/* Waveform buttons */
.wf-row{display:flex;gap:8px}
.wf-btn{flex:1;padding:10px 4px 8px;background:var(--card);border:1.5px solid var(--border);
  border-radius:5px;cursor:pointer;transition:all .12s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;color:var(--text3)}
.wf-btn:hover{border-color:var(--text3)}
.wf-btn.sel{border-color:var(--esp);color:var(--esp);background:#2856a006}
.wf-btn svg{display:block}
.wf-label{font-family:"Consolas","SF Mono",monospace;font-size:11px;font-weight:600;letter-spacing:.3px}

/* Start/Stop */
.big-btn{display:block;width:100%;padding:14px;margin-top:14px;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .12s}
.big-btn.go{background:var(--green);color:#fff}
.big-btn.go:hover{background:#168040}
.big-btn.halt{background:var(--red);color:#fff}
.big-btn.halt:hover{background:#b42818}

/* Pin grid */
.pin-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
@media(min-width:440px){.pin-grid{grid-template-columns:repeat(10,1fr)}}
.pin-btn{padding:10px 0;background:var(--card);border:1.5px solid var(--border);border-radius:5px;
  font-family:"Consolas","SF Mono",monospace;font-size:12px;font-weight:700;color:var(--text3);
  cursor:pointer;transition:all .12s;text-align:center}
.pin-btn:hover{border-color:var(--text2)}
.pin-btn.on{background:#16786810;border-color:var(--hv);color:var(--hv);font-weight:800}
.pin-actions{display:flex;gap:6px}
.sm-btn{flex:1;padding:8px;background:var(--input);border:1.5px solid var(--border);border-radius:5px;
  font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .12s}
.sm-btn:hover{border-color:var(--text3);background:#eeedea}

/* Tabs */
.tab-row{display:flex;gap:2px;margin-left:auto}
.tab-btn{padding:4px 12px;background:transparent;border:1.5px solid transparent;border-radius:4px;
  font-family:"Consolas","SF Mono","Menlo",monospace;font-size:11px;font-weight:600;
  letter-spacing:.5px;color:var(--text3);cursor:pointer;transition:all .12s}
.tab-btn:hover{color:var(--text2);background:#f0efec}
.tab-btn.sel{background:var(--esp);color:#fff;border-color:var(--esp)}

/* Speech/Music feedback */
.tts-msg{margin-top:10px;padding:8px 12px;border-radius:5px;font-size:12px;text-align:center;display:none;
  font-family:"Consolas","SF Mono",monospace}
.tts-msg.ok{background:#1a884815;color:var(--green);display:block}
.tts-msg.err{background:#c82e2015;color:var(--red);display:block}
.tts-msg.info{background:#2856a015;color:var(--esp);display:block}

/* Song buttons */
.song-btn{padding:7px 12px;background:var(--input);border:1.5px solid var(--border);border-radius:5px;
  font-family:"Consolas","SF Mono",monospace;font-size:11px;font-weight:600;color:var(--text2);
  cursor:pointer;transition:all .12s}
.song-btn:hover{border-color:var(--text3);background:#eeedea}
.song-btn:disabled{opacity:.5;cursor:not-allowed}
.song-row{display:flex;align-items:center;gap:8px}
.song-row .song-meta{font-family:"Consolas","SF Mono",monospace;font-size:11px;color:var(--text3);white-space:nowrap}

/* Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  padding:10px 20px;background:var(--red);color:#fff;border-radius:var(--radius);font-size:13px;
  opacity:0;transition:all .3s ease;pointer-events:none;z-index:10;max-width:90%;text-align:center;
  box-shadow:0 4px 12px #0003}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Terminal */
.term{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;box-shadow:0 1px 3px #0001}
.term-toggle{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;
  cursor:pointer;-webkit-user-select:none;user-select:none;background:#faf9f7;
  border-bottom:1px solid var(--border)}
.term-toggle b{font-family:"Consolas","SF Mono","Menlo",monospace;font-size:13px;
  letter-spacing:.5px;color:var(--text2)}
.term-toggle .chev{font-size:11px;color:var(--text3);transition:transform .2s}
.term.open .chev{transform:rotate(180deg)}
.term-body{display:none;padding:0}
.term.open .term-body{display:block}
.term-out{min-height:100px;height:200px;max-height:80vh;resize:vertical;overflow-y:auto;
  background:#1a1a2e;color:#e0e0e0;font-family:"Consolas","SF Mono","Menlo",monospace;
  font-size:13px;padding:8px 10px;margin:0;white-space:pre-wrap;word-break:break-all;
  line-height:1.45;border:none;border-bottom:1px solid #2a2a3e}
.term-out .err{color:#f06060}
.term-in-row{display:flex;align-items:center;background:#1a1a2e;padding:0 10px 8px}
.term-prompt{color:#7a7;font-family:"Consolas","SF Mono","Menlo",monospace;font-size:13px;
  margin-right:6px;flex-shrink:0}
.term-in{flex:1;background:transparent;border:none;outline:none;color:#e0e0e0;
  font-family:"Consolas","SF Mono","Menlo",monospace;font-size:13px;padding:4px 0}
.term-clear{font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;
  padding:2px 6px;margin-left:4px;font-family:inherit}
.term-clear:hover{color:#e0e0e0}
</style>
</head>
<body>

<header id="header">
  <div class="brand">OPTACON</div>
  <div class="status">
    <span><span class="dot" id="dot"></span><span id="conn">--</span></span>
    <span id="badge" class="badge stop">STOPPED</span>
    <a href="/wifi" class="wifi-link" id="wifi-link" title="WiFi Settings">WiFi</a>
  </div>
</header>

<!-- ESP32 Signal Generator -->
<div class="card esp" id="card-esp">
  <div class="card-h">
    <b>ESP32</b>
    <div class="tab-row">
      <button class="tab-btn sel" id="tab-btn-signal" data-tab="signal">Signal</button>
      <button class="tab-btn" id="tab-btn-music" data-tab="music">Music</button>
      <button class="tab-btn" id="tab-btn-speech" data-tab="speech">Speech</button>
    </div>
  </div>
  <div class="card-b">
    <!-- Shared waveform selector (hidden on Speech tab, DC disabled on Music tab) -->
    <div class="field" id="waveform-section">
      <label>Waveform</label>
      <div class="wf-row">
        <button class="wf-btn" id="wf-dc" data-wf="dc">
          <svg viewBox="0 0 60 28" width="56" height="26">
            <line x1="0" y1="6" x2="60" y2="6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line class="center-line" x1="0" y1="14" x2="60" y2="14" stroke="var(--drv)" stroke-width="0.8" stroke-dasharray="2,2" style="display:none"/>
          </svg>
          <span class="wf-label">DC</span>
        </button>
        <button class="wf-btn sel" id="wf-sine" data-wf="sine">
          <svg viewBox="0 0 60 28" width="56" height="26">
            <path d="M0,14 C2.5,8.2 5,3 7.5,3 C10,3 12.5,8.2 15,14 C17.5,19.8 20,25 22.5,25 C25,25 27.5,19.8 30,14 C32.5,8.2 35,3 37.5,3 C40,3 42.5,8.2 45,14 C47.5,19.8 50,25 52.5,25 C55,25 57.5,19.8 60,14" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round"/>
            <line class="center-line" x1="0" y1="14" x2="60" y2="14" stroke="var(--drv)" stroke-width="0.8" stroke-dasharray="2,2" style="display:none"/>
          </svg>
          <span class="wf-label">Sine</span>
        </button>
        <button class="wf-btn" id="wf-triangle" data-wf="triangle">
          <svg viewBox="0 0 60 28" width="56" height="26">
            <polyline points="0,14 7.5,3 22.5,25 37.5,3 52.5,25 60,14" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <line class="center-line" x1="0" y1="14" x2="60" y2="14" stroke="var(--drv)" stroke-width="0.8" stroke-dasharray="2,2" style="display:none"/>
          </svg>
          <span class="wf-label">Triangle</span>
        </button>
        <button class="wf-btn" id="wf-square" data-wf="square">
          <svg viewBox="0 0 60 28" width="56" height="26">
            <polyline points="0,3 15,3 15,25 30,25 30,3 45,3 45,25 60,25" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <line class="center-line" x1="0" y1="14" x2="60" y2="14" stroke="var(--drv)" stroke-width="0.8" stroke-dasharray="2,2" style="display:none"/>
          </svg>
          <span class="wf-label">Square</span>
        </button>
      </div>
    </div>

    <!-- Signal tab -->
    <div class="tab-panel" id="tab-signal">
      <div class="field" id="freq-field">
        <label>Frequency</label>
        <div class="freq-row">
          <input type="range" id="freq-slider" min="0" max="500" value="250">
          <input type="number" id="freq" min="0" max="500" value="250" step="1">
          <span class="unit">Hz</span>
        </div>
      </div>
      <div class="field row" style="margin-bottom:12px">
        <input type="checkbox" id="fullwave">
        <label for="fullwave" style="cursor:pointer;text-transform:none;white-space:nowrap">Toggle Polarity</label>
      </div>
      <div class="field">
        <label>Amplitude <span id="amp-val" style="color:var(--text);font-family:'Consolas','SF Mono',monospace">50%</span></label>
        <input type="range" id="amplitude" min="0" max="100" value="50">
      </div>
      <div class="field-row" style="visibility:hidden;display:none">
        <div class="field">
          <label>Dead Time</label>
          <div class="input-row">
            <input type="number" id="dead-time" min="0" value="0">
            <span class="unit">ticks</span>
          </div>
        </div>
        <div class="field">
          <label>Phase Advance</label>
          <div class="input-row">
            <input type="number" id="phase-advance" min="0" value="0">
            <span class="unit">ticks</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Speech tab -->
    <div class="tab-panel" id="tab-speech" style="display:none">
      <div class="field" id="tts-text-field">
        <label>Text</label>
        <input type="text" id="tts-text" placeholder="Type something to say..." autocomplete="off"
          style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;
          font-family:inherit;font-size:14px;background:var(--input);color:var(--text)">
      </div>
      <div class="field-row" id="tts-sliders">
        <div class="field" id="tts-speed-field">
          <label>Speed <span id="tts-speed-val" style="color:var(--text);font-family:'Consolas','SF Mono',monospace">72</span></label>
          <input type="range" id="tts-speed" min="1" max="255" value="72">
        </div>
        <div class="field" id="tts-pitch-field">
          <label>Pitch <span id="tts-pitch-val" style="color:var(--text);font-family:'Consolas','SF Mono',monospace">64</span></label>
          <input type="range" id="tts-pitch" min="1" max="255" value="64">
        </div>
      </div>
      <div class="tts-msg" id="tts-msg"></div>
    </div>

    <!-- Music tab -->
    <div class="tab-panel" id="tab-music" style="display:none">
      <div class="field" id="music-songs-field">
        <label>Built-in Songs</label>
        <div id="songs" style="display:flex;flex-direction:column;gap:4px">Loading...</div>
      </div>
      <div class="field" id="music-notes-field">
        <label>Notes</label>
        <textarea id="music-notes" rows="3" placeholder="C4:4 D4:4 E4:4 F4:4 G4:2"
          style="width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;
          font-family:'Consolas','SF Mono',monospace;font-size:13px;background:var(--input);color:var(--text);
          resize:vertical;line-height:1.5"></textarea>
        <div id="music-notes-help" style="font-size:11px;color:var(--text3);margin-top:3px">NOTE:BEATS — C4:4 quarter, E4:8 eighth, G4:2 half, R:4 rest</div>
      </div>
      <div class="field" id="music-bpm-field">
        <label>BPM</label>
        <div class="input-row">
          <input type="number" id="music-bpm" value="120" min="30" max="600" style="width:72px">
        </div>
      </div>
      <div class="tts-msg" id="music-msg"></div>
    </div>
  </div>
</div>

<!-- DRV2665 Piezo Driver -->
<div class="card drv" id="card-drv">
  <div class="card-h"><b>DRV2665</b> <span>Piezo Driver</span></div>
  <div class="card-b">
    <div class="field">
      <label>Gain</label>
      <div class="gain-row">
        <button class="gain-btn" id="gain-25" data-g="25"><span class="db">28.8 dB</span><span class="vpp">25 Vpp</span></button>
        <button class="gain-btn" id="gain-50" data-g="50"><span class="db">34.8 dB</span><span class="vpp">50 Vpp</span></button>
        <button class="gain-btn" id="gain-75" data-g="75"><span class="db">38.4 dB</span><span class="vpp">75 Vpp</span></button>
        <button class="gain-btn sel" id="gain-100" data-g="100"><span class="db">40.7 dB</span><span class="vpp">100 Vpp</span></button>
      </div>
    </div>
    <button class="big-btn go" id="start-stop">START</button>
  </div>
</div>

<!-- HV509 Shift Registers -->
<div class="card hv" id="card-hv">
  <div class="card-h"><b>HV509</b> <span>Shift Registers</span></div>
  <div class="card-b">
    <div class="pin-grid" id="pin-grid"></div>
    <div class="pin-actions">
      <button class="sm-btn" id="set-all">SET ALL</button>
      <button class="sm-btn" id="clear-all">CLEAR ALL</button>
    </div>
  </div>
</div>

<!-- Terminal -->
<div class="term" id="term">
  <div class="term-toggle" id="term-toggle" onclick="toggleTerm()">
    <b>Terminal</b>
    <span style="display:flex;align-items:center;gap:8px">
      <a href="/web/docs.html" target="_blank" id="docs-link"
         onclick="event.stopPropagation()"
         style="font-size:11px;color:var(--esp);text-decoration:none;font-weight:600;
                padding:2px 6px;border:1px solid var(--esp);border-radius:4px">API Docs</a>
      <span class="chev">&#9660;</span>
    </span>
  </div>
  <div class="term-body">
    <pre class="term-out" id="term-out"></pre>
    <div class="term-in-row">
      <span class="term-prompt">&gt;&gt;&gt;</span>
      <input class="term-in" id="term-in" type="text" spellcheck="false" autocomplete="off"
             placeholder="Python expression or statement">
      <button class="term-clear" id="term-clear" onclick="clearTerm()" title="Clear output">Clear</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="footer" id="footer" style="text-align:center;padding:16px 0 4px;font-size:11px;color:var(--text3)">
  <a href="/wifi" style="color:var(--esp);text-decoration:none">WiFi</a> &middot;
  <a href="/update" style="color:var(--esp);text-decoration:none">Updates</a>
  &middot; <span id="ver-info"></span>
</div>

<script>
var ws=null,state={},upd=false,rdelay=1e3,selGain=100,selWaveform='sine';
var activeTab='signal',musicPlaying=false,speaking=false;
var tabWaveform={signal:'sine',music:'sine',speech:'square'};
var $=function(id){return document.getElementById(id)};
var dot=$('dot'),conn=$('conn'),badge=$('badge');
var freqField=$('freq-field'),freqSlider=$('freq-slider'),freq=$('freq'),fullwave=$('fullwave');
var amplitude=$('amplitude'),ampVal=$('amp-val');
var deadTime=$('dead-time'),phaseAdv=$('phase-advance');
var startStop=$('start-stop');
var ttsSpeed=$('tts-speed'),ttsPitch=$('tts-pitch');

// Button labels per tab
var tabLabels={signal:['START','STOP'],speech:['SPEAK','SPEAKING...'],music:['PLAY','STOP']};

// Slider fill
function fillSlider(el,color){
  var p=((el.value-el.min)/(el.max-el.min))*100;
  el.style.background='linear-gradient(to right,'+color+' '+p+'%,#d8d6d0 '+p+'%)';
}
function updateSliders(){
  fillSlider(freqSlider,'#2856a0');
  fillSlider(amplitude,'#2856a0');
}

// Pin grid
var pinGrid=$('pin-grid');
for(var i=0;i<20;i++){
  var b=document.createElement('button');
  b.className='pin-btn';b.id='pin-'+i;b.textContent=i;
  b.onclick=(function(n){return function(){
    send({cmd:'set_pin',pin:n,value:state.pins?!state.pins[n]:1});
  }})(i);
  pinGrid.appendChild(b);
}

// WebSocket
function connect(){
  try{ws=new WebSocket('ws://'+location.host+'/ws')}catch(e){schedReconn();return}
  ws.onopen=function(){rdelay=1e3;dot.classList.add('on');conn.textContent='Connected'};
  ws.onclose=function(){dot.classList.remove('on');conn.textContent='Disconnected';schedReconn()};
  ws.onerror=function(){};
  ws.onmessage=function(e){
    var d;try{d=JSON.parse(e.data)}catch(x){return}
    if(d.output!=null){termAppend(d.output||'');return}
    if(d.msg==='speech complete'){
      speaking=false;startStop.disabled=false;updateStartBtn();
      showTtsMsg('Done','ok');return;
    }
    if(d.msg==='music complete'){setMusicPlaying(false);showMusicMsg('Done','ok');return}
    if(d.error){showErr(d.error);
      speaking=false;startStop.disabled=false;setMusicPlaying(false);updateStartBtn();return;
    }
    state=d;upd=true;updateUI();upd=false;
  };
}
function schedReconn(){setTimeout(connect,rdelay);rdelay=Math.min(rdelay*2,3e4)}
function send(cmd){if(ws&&ws.readyState===1)ws.send(JSON.stringify(cmd))}

function updateDcState(){
  var isDc=selWaveform==='dc';
  freqField.style.opacity=isDc?'0.35':'1';
  freqField.style.pointerEvents=isDc?'none':'';
}

function sendFreq(){
  if(upd)return;
  var wf=selWaveform;
  if(wf==='dc'){
    send({cmd:'set_frequency_analog',hz:0,
      amplitude:parseInt(amplitude.value)||50,
      fullwave:false,dead_time:0,phase_advance:0,waveform:'sine'});
    return;
  }
  var hz=parseInt(freq.value)||0;
  var fw=fullwave.checked;
  send({cmd:'set_frequency_analog',hz:hz,
    amplitude:parseInt(amplitude.value)||50,
    fullwave:fw,dead_time:parseInt(deadTime.value)||0,
    phase_advance:parseInt(phaseAdv.value)||0,waveform:wf});
}

function updateCenterlines(){
  var lines=document.querySelectorAll('.center-line');
  for(var i=0;i<lines.length;i++){
    lines[i].style.display=fullwave.checked?'':'none';
  }
}

// Update start button label based on active tab and state
function updateStartBtn(){
  if(activeTab==='signal'){
    if(state.running){
      startStop.textContent='STOP';startStop.className='big-btn halt';
    }else{
      startStop.textContent='START';startStop.className='big-btn go';
    }
  }else if(activeTab==='speech'){
    if(speaking){
      startStop.textContent='SPEAKING...';startStop.className='big-btn halt';
    }else{
      startStop.textContent='SPEAK';startStop.className='big-btn go';
    }
  }else if(activeTab==='music'){
    if(musicPlaying){
      startStop.textContent='STOP';startStop.className='big-btn halt';
    }else{
      startStop.textContent='PLAY';startStop.className='big-btn go';
    }
  }
}

// Update waveform section based on active tab
function updateWaveformVis(){
  var wfSection=$('waveform-section');
  wfSection.style.display='';
  var dcBtn=$('wf-dc');
  var isSpeech=activeTab==='speech';
  var isMusic=activeTab==='music';
  // Disable DC on music/speech tabs
  dcBtn.style.opacity=(isMusic||isSpeech)?'0.35':'';
  dcBtn.style.pointerEvents=(isMusic||isSpeech)?'none':'';
  // Disable entire waveform section on speech tab (visible but not interactive)
  var wfBtnsAll=wfSection.querySelectorAll('.wf-btn');
  for(var i=0;i<wfBtnsAll.length;i++){
    wfBtnsAll[i].style.opacity=isSpeech?'0.35':'';
    wfBtnsAll[i].style.pointerEvents=isSpeech?'none':'';
  }
  // Restore per-tab waveform selection
  selWaveform=tabWaveform[activeTab]||'sine';
  var all=document.querySelectorAll('.wf-btn');
  for(var i=0;i<all.length;i++)all[i].classList.toggle('sel',all[i].dataset.wf===selWaveform);
  updateDcState();
}

function updateUI(){
  // Badge
  if(state.running){
    badge.textContent='RUNNING';badge.className='badge run';
  }else{
    badge.textContent='STOPPED';badge.className='badge stop';
  }
  updateStartBtn();
  // Freq range
  freq.min=0;freq.max=500;freqSlider.min=0;freqSlider.max=500;
  // Values
  var fv=state.frequency||0;
  if(fv>0||selWaveform==='dc'){freq.value=fv;freqSlider.value=fv;}
  // Waveform buttons — only sync from server on signal tab
  if(activeTab==='signal'&&selWaveform!=='dc'){
    selWaveform=state.waveform||'sine';
    tabWaveform.signal=selWaveform;
  }
  var wfBtns=document.querySelectorAll('.wf-btn');
  for(var i=0;i<wfBtns.length;i++)wfBtns[i].classList.toggle('sel',wfBtns[i].dataset.wf===selWaveform);
  fullwave.checked=selWaveform==='dc'?!!state.polarity:!!state.fullwave;
  updateDcState();
  updateCenterlines();
  if(state.amplitude!=null){amplitude.value=state.amplitude;ampVal.textContent=state.amplitude+'%'}
  if(state.dead_time!=null)deadTime.value=state.dead_time;
  if(state.phase_advance!=null)phaseAdv.value=state.phase_advance;
  if(state.gain)selGain=state.gain;
  var gbs=document.querySelectorAll('.gain-btn');
  for(var i=0;i<gbs.length;i++)gbs[i].classList.toggle('sel',parseInt(gbs[i].dataset.g)===selGain);
  if(state.pins){
    for(var i=0;i<20;i++){var p=$('pin-'+i);if(p)p.classList.toggle('on',!!state.pins[i])}
  }
  if(state.ip)conn.textContent=state.ip;
  updateSliders();
}

// Frequency slider <-> input sync
freqSlider.oninput=function(){freq.value=this.value;updateSliders()};
freqSlider.onchange=sendFreq;
freq.onchange=function(){freqSlider.value=this.value;updateSliders();sendFreq()};

// Waveform buttons
var wfBtns=document.querySelectorAll('.wf-btn');
for(var i=0;i<wfBtns.length;i++){
  wfBtns[i].onclick=(function(btn){return function(){
    var wasDc=selWaveform==='dc';
    selWaveform=btn.dataset.wf;
    tabWaveform[activeTab]=selWaveform;
    if(wasDc&&selWaveform!=='dc'&&(parseInt(freq.value)||0)===0){
      freq.value=250;freqSlider.value=250;
    }
    var all=document.querySelectorAll('.wf-btn');
    for(var j=0;j<all.length;j++)all[j].classList.toggle('sel',all[j]===btn);
    updateDcState();
    updateSliders();
    if(activeTab==='signal')sendFreq();
  }})(wfBtns[i]);
}

fullwave.onchange=function(){
  updateCenterlines();
  if(selWaveform==='dc'){
    send({cmd:'set_polarity',value:fullwave.checked});
  }else{
    sendFreq();
  }
};
amplitude.oninput=function(){ampVal.textContent=this.value+'%';updateSliders()};
amplitude.onchange=sendFreq;
deadTime.onchange=sendFreq;
phaseAdv.onchange=sendFreq;

// Gain
var gbs=document.querySelectorAll('.gain-btn');
for(var i=0;i<gbs.length;i++){
  gbs[i].onclick=(function(btn){return function(){
    selGain=parseInt(btn.dataset.g);
    var all=document.querySelectorAll('.gain-btn');
    for(var j=0;j<all.length;j++)all[j].classList.toggle('sel',all[j]===btn);
    if(state.running&&activeTab==='signal')send({cmd:'start',gain:selGain});
  }})(gbs[i]);
}

// Start/Stop button — behavior depends on active tab
startStop.onclick=function(){
  if(activeTab==='signal'){
    if(state.running)send({cmd:'stop'});
    else send({cmd:'start',gain:selGain});
  }else if(activeTab==='speech'){
    if(speaking)return;
    var text=$('tts-text').value.trim();
    if(!text){showTtsMsg('Enter some text first','err');return}
    if(!ws||ws.readyState!==1){showTtsMsg('Not connected','err');return}
    speaking=true;startStop.disabled=true;updateStartBtn();
    showTtsMsg('Speaking...','info');
    send({cmd:'say',text:text,speed:parseInt(ttsSpeed.value),pitch:parseInt(ttsPitch.value)});
  }else if(activeTab==='music'){
    if(musicPlaying){
      send({cmd:'stop'});setMusicPlaying(false);showMusicMsg('Stopped','ok');
      return;
    }
    var notes=$('music-notes').value.trim();
    if(!notes){showMusicMsg('Enter some notes first','err');return}
    if(!ws||ws.readyState!==1){showMusicMsg('Not connected','err');return}
    setMusicPlaying(true);showMusicMsg('Playing...','info');
    send({cmd:'play_music',notes:notes,bpm:parseInt($('music-bpm').value)||120,
      waveform:selWaveform,gain:selGain});
  }
};

$('set-all').onclick=function(){send({cmd:'set_all',value:true})};
$('clear-all').onclick=function(){send({cmd:'set_all',value:false})};

function showErr(msg){
  var t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},4e3);
}

updateSliders();
updateDcState();

// Terminal
var termOut=$('term-out'),termIn=$('term-in'),termEl=$('term');
var termHist=[],termIdx=-1;
function toggleTerm(){termEl.classList.toggle('open');if(termEl.classList.contains('open'))termIn.focus()}
function clearTerm(){termOut.textContent=''}
function termAppend(text,cls){
  if(cls){var s=document.createElement('span');s.className=cls;s.textContent=text;termOut.appendChild(s)}
  else termOut.appendChild(document.createTextNode(text));
  termOut.scrollTop=termOut.scrollHeight;
}
termIn.onkeydown=function(e){
  if(e.key==='Enter'){
    var code=termIn.value;if(!code)return;
    termHist.push(code);termIdx=termHist.length;
    termAppend('>>> '+code+'\n');
    send({cmd:'exec',code:code});
    termIn.value='';
  }else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(termIdx>0){termIdx--;termIn.value=termHist[termIdx]}
  }else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(termIdx<termHist.length-1){termIdx++;termIn.value=termHist[termIdx]}
    else{termIdx=termHist.length;termIn.value=''}
  }
};

// Tab switching
var tabBtns=document.querySelectorAll('.tab-btn');
for(var i=0;i<tabBtns.length;i++){
  tabBtns[i].onclick=(function(btn){return function(){
    var all=document.querySelectorAll('.tab-btn');
    for(var j=0;j<all.length;j++)all[j].classList.toggle('sel',all[j]===btn);
    var panels=document.querySelectorAll('.tab-panel');
    for(var j=0;j<panels.length;j++)panels[j].style.display='none';
    $('tab-'+btn.dataset.tab).style.display='';
    activeTab=btn.dataset.tab;
    updateStartBtn();
    updateWaveformVis();
    if(activeTab==='music'&&!songsLoaded)loadSongs();
  }})(tabBtns[i]);
}

// Speech sliders
ttsSpeed.oninput=function(){$('tts-speed-val').textContent=this.value;fillSlider(this,'#2856a0')};
ttsPitch.oninput=function(){$('tts-pitch-val').textContent=this.value;fillSlider(this,'#2856a0')};
fillSlider(ttsSpeed,'#2856a0');fillSlider(ttsPitch,'#2856a0');

function showTtsMsg(text,cls){var el=$('tts-msg');el.textContent=text;el.className='tts-msg '+cls}
function showMusicMsg(text,cls){var el=$('music-msg');el.textContent=text;el.className='tts-msg '+cls}

// Enter on speech text input triggers start button
$('tts-text').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!speaking)startStop.click();
});

// Music
function setMusicPlaying(v){
  musicPlaying=v;updateStartBtn();
  var btns=document.querySelectorAll('.song-btn');
  for(var i=0;i<btns.length;i++)btns[i].disabled=v;
}

// Songs — load list, click populates notes field
var songsLoaded=false,songData={};
function loadSongs(){
  fetch('/api/music/songs').then(function(r){return r.json()}).then(function(d){
    var grid=$('songs');grid.innerHTML='';songsLoaded=true;
    if(!d.songs||!d.songs.length){grid.textContent='No songs available';return}
    d.songs.forEach(function(s){
      var name=typeof s==='string'?s:s.name;
      var notes=s.notes||'';
      var bpm=s.bpm||120;
      var gain=s.gain||75;
      songData[name]={notes:notes,bpm:bpm,gain:gain};
      var row=document.createElement('div');row.className='song-row';
      row.id='song-row-'+name;
      var btn=document.createElement('button');btn.className='song-btn';
      btn.id='song-btn-'+name;
      btn.textContent=name.replace(/_/g,' ');
      btn.onclick=(function(n,no,bp,ga){return function(){
        $('music-notes').value=no;
        $('music-bpm').value=bp;
        selGain=ga;
        var all=document.querySelectorAll('.gain-btn');
        for(var j=0;j<all.length;j++)all[j].classList.toggle('sel',parseInt(all[j].dataset.g)===ga);
      }})(name,notes,bpm,gain);
      var meta=document.createElement('span');meta.className='song-meta';
      meta.id='song-meta-'+name;
      meta.textContent=bpm+' BPM · '+gain+' Vpp';
      row.appendChild(btn);row.appendChild(meta);
      grid.appendChild(row);
    });
  }).catch(function(){$('songs').textContent='Failed to load songs'});
}

connect();
fetch('/api/ota/status').then(function(r){return r.json()}).then(function(d){
  var v='FW '+d.firmware_version;
  if(d.files_version)v+=' · Files '+d.files_version;
  document.getElementById('ver-info').textContent=v;
}).catch(function(){});
</script>
