<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Optacon — Music</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#edebe7;--card:#fff;--border:#ccc9c2;--text:#1a1a20;--text2:#68686e;--text3:#98989e;
  --input:#f5f4f0;--esp:#2856a0;--green:#1a8848;--red:#c82e20;--radius:6px;
}
html{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text)}
body{max-width:520px;margin:0 auto;padding:10px 12px 28px}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;
  box-shadow:0 1px 3px #0001}
.brand{font-family:"Consolas","SF Mono","Menlo",monospace;font-weight:700;font-size:15px;letter-spacing:3px;color:var(--text2)}
a.back{font-size:13px;color:var(--esp);text-decoration:none;font-weight:600}
a.back:hover{text-decoration:underline}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;box-shadow:0 1px 3px #0001;overflow:hidden}
.card-h{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:6px}
.card-h b{color:var(--esp);font-size:14px}
.card-b{padding:14px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.field textarea{
  width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;
  font-family:"Consolas","SF Mono",monospace;font-size:13px;background:var(--input);color:var(--text);
  resize:vertical;line-height:1.5}
.field select,.field input[type=number]{
  padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;
  font-family:inherit;font-size:13px;background:var(--input);color:var(--text)}
.field select{cursor:pointer}
.field input[type=number]{width:80px}
.help{font-size:11px;color:var(--text3);margin-top:4px;line-height:1.4}
.fields-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.fields-row .field{margin-bottom:0;flex:1;min-width:100px}
.btn-row{display:flex;gap:8px;margin-top:8px}
.big-btn{flex:1;padding:12px;border:none;border-radius:5px;font-family:inherit;
  font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s}
.big-btn.go{background:var(--green);color:#fff}
.big-btn.go:hover{filter:brightness(1.1)}
.big-btn.halt{background:var(--red);color:#fff}
.big-btn.halt:hover{filter:brightness(1.1)}
.big-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:10px;padding:10px;border-radius:5px;font-size:13px;text-align:center;display:none}
.msg.ok{background:#1a884815;color:var(--green);display:block}
.msg.err{background:#c82e2015;color:var(--red);display:block}
.msg.info{background:#2856a015;color:var(--esp);display:block}
.songs-grid{display:flex;flex-wrap:wrap;gap:6px}
.song-btn{padding:8px 14px;background:var(--input);border:1.5px solid var(--border);border-radius:5px;
  font-family:inherit;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .12s}
.song-btn:hover{border-color:var(--text3);background:#eeedea}
.song-btn:disabled{opacity:.5;cursor:not-allowed}
.footer{text-align:center;padding:16px 0 4px;font-size:11px;color:var(--text3)}
.footer a{color:var(--esp);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<header>
  <div class="brand">OPTACON</div>
  <a href="/" class="back">Control Panel</a>
</header>

<div class="card">
  <div class="card-h"><b>PWM</b> <span>Sheet Music</span></div>
  <div class="card-b">
    <div class="field">
      <label>Notes</label>
      <textarea id="notes" rows="4" placeholder="C4:4 D4:4 E4:4 F4:4 G4:2"></textarea>
      <div class="help">Format: NOTE:BEATS &mdash; e.g. C4:4 = C4 quarter, E4:8 = eighth, G4:2 = half, R:4 = quarter rest</div>
    </div>
    <div class="fields-row">
      <div class="field">
        <label>BPM</label>
        <input type="number" id="bpm" value="120" min="30" max="600">
      </div>
      <div class="field">
        <label>Waveform</label>
        <select id="waveform">
          <option value="sine">Sine</option>
          <option value="triangle">Triangle</option>
          <option value="square" selected>Square</option>
        </select>
      </div>
      <div class="field">
        <label>Gain (Vpp)</label>
        <select id="gain">
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="75" selected>75</option>
          <option value="100">100</option>
        </select>
      </div>
    </div>
    <div class="btn-row">
      <button class="big-btn go" id="play-btn">PLAY</button>
      <button class="big-btn halt" id="stop-btn">STOP</button>
    </div>
    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="card">
  <div class="card-h"><b>PWM</b> <span>Built-in Songs</span></div>
  <div class="card-b">
    <div class="songs-grid" id="songs">Loading...</div>
  </div>
</div>

<div class="footer">
  <a href="/">Control Panel</a> &middot;
  <a href="/speech">Speech</a> &middot;
  <a href="/wifi">WiFi</a> &middot;
  <a href="/update">Updates</a>
</div>

<script>
var $=function(id){return document.getElementById(id)};
var ws=null;
var playing=false;

function connect(){
  ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=function(){};
  ws.onclose=function(){ws=null;setTimeout(connect,2000)};
  ws.onmessage=function(ev){
    var d=JSON.parse(ev.data);
    if(d.msg==='music complete'){
      setPlaying(false);
      showMsg('Done','ok');
    }else if(d.error){
      setPlaying(false);
      showMsg(d.error,'err');
    }
  };
}

function showMsg(text,cls){
  var el=$('msg');
  el.textContent=text;
  el.className='msg '+cls;
}

function setPlaying(v){
  playing=v;
  $('play-btn').disabled=v;
  $('play-btn').textContent=v?'PLAYING...':'PLAY';
  var btns=document.querySelectorAll('.song-btn');
  for(var i=0;i<btns.length;i++)btns[i].disabled=v;
}

$('play-btn').onclick=function(){
  var notes=$('notes').value.trim();
  if(!notes){showMsg('Enter some notes first','err');return}
  if(!ws||ws.readyState!==1){showMsg('Not connected','err');return}
  setPlaying(true);
  showMsg('Playing...','info');
  ws.send(JSON.stringify({
    cmd:'play_music',
    notes:notes,
    bpm:parseInt($('bpm').value)||120,
    waveform:$('waveform').value,
    gain:parseInt($('gain').value)||75
  }));
};

$('stop-btn').onclick=function(){
  if(!ws||ws.readyState!==1)return;
  ws.send(JSON.stringify({cmd:'stop'}));
  setPlaying(false);
  showMsg('Stopped','ok');
};

// Load built-in songs
function loadSongs(){
  fetch('/api/music/songs').then(function(r){return r.json()}).then(function(d){
    var grid=$('songs');
    grid.innerHTML='';
    if(!d.songs||!d.songs.length){grid.textContent='No songs available';return}
    d.songs.forEach(function(name){
      var btn=document.createElement('button');
      btn.className='song-btn';
      btn.textContent=name.replace(/_/g,' ');
      btn.onclick=function(){
        if(!ws||ws.readyState!==1){showMsg('Not connected','err');return}
        setPlaying(true);
        showMsg('Playing '+name.replace(/_/g,' ')+'...','info');
        ws.send(JSON.stringify({
          cmd:'play_song',
          name:name,
          waveform:$('waveform').value
        }));
      };
      grid.appendChild(btn);
    });
  }).catch(function(){
    $('songs').textContent='Failed to load songs';
  });
}

connect();
loadSongs();
</script>
</body>
</html>
