<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Optacon — Speech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#edebe7;--card:#fff;--border:#ccc9c2;--text:#1a1a20;--text2:#68686e;--text3:#98989e;
  --input:#f5f4f0;--esp:#2856a0;--green:#1a8848;--red:#c82e20;--radius:6px;
}
html{font-family:system-ui,-apple-system,sans-serif;font-size:14px;background:var(--bg);color:var(--text)}
body{max-width:520px;margin:0 auto;padding:10px 12px 28px}
header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;
  box-shadow:0 1px 3px #0001}
.brand{font-family:"Consolas","SF Mono","Menlo",monospace;font-weight:700;font-size:15px;letter-spacing:3px;color:var(--text2)}
a.back{font-size:13px;color:var(--esp);text-decoration:none;font-weight:600}
a.back:hover{text-decoration:underline}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:10px;box-shadow:0 1px 3px #0001;overflow:hidden}
.card-h{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;color:var(--text2);
  display:flex;align-items:center;gap:6px}
.card-h b{color:var(--esp);font-size:14px}
.card-b{padding:14px}
.field{margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.field input[type=text]{
  width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:5px;
  font-family:inherit;font-size:14px;background:var(--input);color:var(--text)}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--esp)}
.slider-val{font-family:"Consolas","SF Mono",monospace;font-size:13px;color:var(--text);
  min-width:28px;text-align:right}
.big-btn{width:100%;padding:12px;border:none;border-radius:5px;font-family:inherit;
  font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s;
  margin-top:8px}
.big-btn.apply{background:var(--esp);color:#fff}
.big-btn.apply:hover{filter:brightness(1.1)}
.big-btn:disabled{opacity:.5;cursor:not-allowed}
.msg{margin-top:10px;padding:10px;border-radius:5px;font-size:13px;text-align:center;display:none}
.msg.ok{background:#1a884815;color:var(--green);display:block}
.msg.err{background:#c82e2015;color:var(--red);display:block}
.msg.info{background:#2856a015;color:var(--esp);display:block}
.footer{text-align:center;padding:16px 0 4px;font-size:11px;color:var(--text3)}
.footer a{color:var(--esp);text-decoration:none}
.footer a:hover{text-decoration:underline}
</style>
</head>
<body>

<header>
  <div class="brand">OPTACON</div>
  <a href="/" class="back">Control Panel</a>
</header>

<div class="card">
  <div class="card-h"><b>SAM</b> <span>Text-to-Speech</span></div>
  <div class="card-b">
    <div class="field">
      <label>Text</label>
      <input type="text" id="text" placeholder="Type something to say..." autocomplete="off">
    </div>
    <div class="field">
      <label>Speed</label>
      <div class="slider-row">
        <input type="range" id="speed" min="1" max="255" value="72">
        <span class="slider-val" id="speed-val">72</span>
      </div>
    </div>
    <div class="field">
      <label>Pitch</label>
      <div class="slider-row">
        <input type="range" id="pitch" min="1" max="255" value="64">
        <span class="slider-val" id="pitch-val">64</span>
      </div>
    </div>
    <button class="big-btn apply" id="speak-btn">SPEAK</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<div class="footer">
  <a href="/">Control Panel</a> &middot;
  <a href="/music">Music</a> &middot;
  <a href="/wifi">WiFi</a> &middot;
  <a href="/update">Updates</a>
</div>

<script>
var $=function(id){return document.getElementById(id)};
var ws=null;

function connect(){
  ws=new WebSocket('ws://'+location.host+'/ws');
  ws.onopen=function(){};
  ws.onclose=function(){ws=null;setTimeout(connect,2000)};
  ws.onmessage=function(ev){
    var d=JSON.parse(ev.data);
    if(d.msg==='speech complete'){
      $('speak-btn').disabled=false;
      $('speak-btn').textContent='SPEAK';
      showMsg('Done','ok');
    }else if(d.error){
      $('speak-btn').disabled=false;
      $('speak-btn').textContent='SPEAK';
      showMsg(d.error,'err');
    }
  };
}

function showMsg(text,cls){
  var el=$('msg');
  el.textContent=text;
  el.className='msg '+cls;
}
function hideMsg(){$('msg').className='msg';$('msg').textContent=''}

$('speed').oninput=function(){$('speed-val').textContent=this.value};
$('pitch').oninput=function(){$('pitch-val').textContent=this.value};

$('speak-btn').onclick=function(){
  var text=$('text').value.trim();
  if(!text){showMsg('Enter some text first','err');return}
  if(!ws||ws.readyState!==1){showMsg('Not connected','err');return}
  this.disabled=true;
  this.textContent='SPEAKING...';
  showMsg('Speaking...','info');
  ws.send(JSON.stringify({
    cmd:'say',
    text:text,
    speed:parseInt($('speed').value),
    pitch:parseInt($('pitch').value)
  }));
};

$('text').addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!$('speak-btn').disabled)$('speak-btn').click();
});

connect();
</script>
</body>
</html>
